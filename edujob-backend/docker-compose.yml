version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: edujob-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: edujob_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edujob-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: